<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회계의 ABC — 계정과목 문제은행</title>
  <style>
    :root {
      --bg: #fdf8f5;
      --accent: #c4917a;
      --text: #2c1a0e;
      --muted: #7a5540;
      --card: #ffffff;
      --btn-bg: #2c1a0e;
      --btn-text: #fdf8f5;
      --border: #e8ddd7;
      --correct: #2d7a52;
      --correct-bg: #eef8f2;
      --correct-border: #a8d9be;
      --wrong: #b53a2e;
      --wrong-bg: #fdf0ee;
      --wrong-border: #e8b4b0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .screen { display: none; }
    .screen.active { display: flex; flex-direction: column; min-height: 100vh; }

    /* ── Shared header ── */
    .app-header {
      background: var(--btn-bg);
      color: var(--btn-text);
      padding: 2.4rem 1.5rem 2rem;
      text-align: center;
      flex-shrink: 0;
    }
    .app-header .tag {
      display: inline-block;
      background: rgba(196, 145, 122, 0.25);
      color: var(--accent);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 2px;
      padding: 0.28rem 0.85rem;
      border-radius: 20px;
      margin-bottom: 0.65rem;
    }
    .app-header h1 {
      font-size: 1.55rem;
      font-weight: 800;
      color: var(--btn-text);
    }
    .app-header p {
      font-size: 0.83rem;
      color: rgba(253, 248, 245, 0.55);
      margin-top: 0.35rem;
    }

    /* ════════════════════════════════
       HOME SCREEN
    ════════════════════════════════ */
    .home-body {
      flex: 1;
      padding: 2rem 1rem 3rem;
      max-width: 580px;
      margin: 0 auto;
      width: 100%;
    }

    .section-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 0.9rem;
    }

    .category-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 1.4rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
      margin-bottom: 0.75rem;
    }
    .category-card:hover {
      border-color: var(--accent);
      box-shadow: 0 4px 18px rgba(196, 145, 122, 0.18);
    }
    .cat-name {
      font-size: 0.97rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.18rem;
    }
    .cat-sub {
      font-size: 0.78rem;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 0.35rem;
    }
    .cat-meta {
      font-size: 0.76rem;
      color: var(--muted);
    }
    .cat-arrow {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--btn-bg);
      color: var(--btn-text);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
      transition: transform 0.15s;
    }
    .category-card:hover .cat-arrow { transform: translateX(3px); }

    /* ════════════════════════════════
       QUIZ SCREEN
    ════════════════════════════════ */
    .quiz-nav {
      background: var(--btn-bg);
      padding: 0.85rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.9rem;
      flex-shrink: 0;
    }
    .btn-nav-home {
      background: transparent;
      border: 1.5px solid rgba(253, 248, 245, 0.28);
      color: var(--btn-text);
      padding: 0.38rem 0.9rem;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .btn-nav-home:hover { background: rgba(253, 248, 245, 0.1); }
    .quiz-nav-label {
      font-size: 0.8rem;
      color: rgba(253, 248, 245, 0.6);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .quiz-body {
      flex: 1;
      padding: 1.5rem 1rem 3rem;
      max-width: 640px;
      margin: 0 auto;
      width: 100%;
    }

    /* Progress */
    .progress-wrap {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      margin-bottom: 1.4rem;
    }
    .progress-bar {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 10px;
      transition: width 0.45s ease;
    }
    .progress-label {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--muted);
      white-space: nowrap;
    }

    /* Question card */
    .q-card {
      background: var(--card);
      border-radius: 18px;
      padding: 1.7rem;
      box-shadow: 0 2px 14px rgba(44, 26, 14, 0.07);
    }

    /* Principle toggle */
    .principle-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.38rem;
      background: transparent;
      border: 1.5px solid var(--accent);
      color: var(--accent);
      font-size: 0.78rem;
      font-weight: 700;
      padding: 0.38rem 0.85rem;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      margin-bottom: 1.1rem;
      transition: background 0.15s;
    }
    .principle-btn:hover { background: rgba(196, 145, 122, 0.09); }

    .principle-box {
      display: none;
      background: rgba(196, 145, 122, 0.07);
      border-left: 3px solid var(--accent);
      border-radius: 0 10px 10px 0;
      padding: 0.85rem 1.1rem;
      font-size: 0.84rem;
      line-height: 1.85;
      color: var(--muted);
      margin-bottom: 1.2rem;
    }
    .principle-box.open { display: block; }

    /* Question text */
    .q-text {
      font-size: 0.98rem;
      font-weight: 600;
      line-height: 1.85;
      color: var(--text);
      margin-bottom: 1.25rem;
      white-space: pre-line;
    }

    /* Choices */
    .choices { display: flex; flex-direction: column; gap: 0.5rem; }

    .choice {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.78rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      background: var(--bg);
      cursor: pointer;
      font-size: 0.91rem;
      color: var(--text);
      text-align: left;
      font-family: inherit;
      line-height: 1.5;
      transition: border-color 0.15s, background 0.15s;
    }
    .choice:hover:not(:disabled) {
      border-color: var(--accent);
      background: rgba(196, 145, 122, 0.07);
    }
    .choice .badge {
      width: 27px;
      height: 27px;
      border-radius: 50%;
      background: var(--border);
      color: var(--muted);
      font-weight: 800;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, color 0.15s;
    }
    .choice.correct {
      border-color: var(--correct-border);
      background: var(--correct-bg);
    }
    .choice.correct .badge {
      background: var(--correct);
      color: #fff;
    }
    .choice.wrong {
      border-color: var(--wrong-border);
      background: var(--wrong-bg);
    }
    .choice.wrong .badge {
      background: var(--wrong);
      color: #fff;
    }
    .choice:disabled { cursor: default; }

    /* Feedback */
    .feedback {
      display: none;
      margin-top: 1.1rem;
      padding: 0.85rem 1.1rem;
      border-radius: 10px;
      font-size: 0.86rem;
      line-height: 1.78;
    }
    .feedback.correct {
      display: block;
      background: var(--correct-bg);
      border-left: 3px solid var(--correct);
      color: var(--correct);
    }
    .feedback.wrong {
      display: block;
      background: var(--wrong-bg);
      border-left: 3px solid var(--wrong);
      color: var(--wrong);
    }

    /* Action buttons */
    .action-row {
      display: flex;
      gap: 0.65rem;
      margin-top: 1.2rem;
    }
    .btn {
      padding: 0.68rem 1.4rem;
      border: none;
      border-radius: 10px;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-next {
      background: var(--btn-bg);
      color: var(--btn-text);
    }
    .btn-next:hover { opacity: 0.82; }
    .btn-retry {
      background: var(--wrong);
      color: #fff;
    }
    .btn-retry:hover { opacity: 0.85; }

    /* ════════════════════════════════
       RESULT SCREEN
    ════════════════════════════════ */
    .result-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 1.5rem;
      text-align: center;
    }
    .result-icon { font-size: 3.5rem; margin-bottom: 1rem; }
    .result-title {
      font-size: 1.35rem;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 1.2rem;
    }
    .result-score-wrap {
      display: flex;
      align-items: baseline;
      gap: 0.3rem;
      margin-bottom: 0.5rem;
    }
    .result-correct {
      font-size: 3.2rem;
      font-weight: 900;
      color: var(--accent);
      line-height: 1;
    }
    .result-sep {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--border);
    }
    .result-total-num {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--muted);
    }
    .result-unit {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 0.6rem;
    }
    .result-msg {
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 1.75;
      margin-bottom: 2.2rem;
      max-width: 320px;
    }
    .result-actions {
      display: flex;
      gap: 0.75rem;
    }
    .btn-outline {
      background: transparent;
      border: 2px solid var(--btn-bg);
      color: var(--btn-bg);
      padding: 0.68rem 1.4rem;
      border-radius: 10px;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    .btn-outline:hover { background: rgba(44, 26, 14, 0.06); }
  </style>
</head>
<body>

<!-- ════════════════════════════════
     시작 화면
════════════════════════════════ -->
<div id="screen-home" class="screen active">
  <div class="app-header">
    <div class="tag">문제은행</div>
    <h1>회계의 ABC</h1>
    <p>카테고리를 선택해 학습을 시작하세요</p>
  </div>
  <div class="home-body">
    <div class="section-label">CATEGORY</div>
    <div id="category-list"></div>
  </div>
</div>

<!-- ════════════════════════════════
     퀴즈 화면
════════════════════════════════ -->
<div id="screen-quiz" class="screen">
  <div class="quiz-nav">
    <button class="btn-nav-home" onclick="goHome()">← 홈으로</button>
    <div class="quiz-nav-label" id="quiz-nav-label"></div>
  </div>
  <div class="quiz-body">
    <div class="progress-wrap">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="progress-label" id="progressLabel">1 / 15</div>
    </div>
    <div class="q-card">
      <button class="principle-btn" id="principleBtn" onclick="togglePrinciple()">
        💡 기본원리
      </button>
      <div class="principle-box" id="principleBox"></div>
      <div class="q-text" id="qText"></div>
      <div class="choices" id="choices"></div>
      <div class="feedback" id="feedback"></div>
      <div class="action-row" id="actionRow"></div>
    </div>
  </div>
</div>

<!-- ════════════════════════════════
     결과 화면
════════════════════════════════ -->
<div id="screen-result" class="screen">
  <div class="app-header">
    <div class="tag">결과</div>
    <h1 id="result-cat-name"></h1>
  </div>
  <div class="result-body">
    <div class="result-icon" id="result-icon">🌟</div>
    <div class="result-title" id="result-title">학습 완료!</div>
    <div class="result-score-wrap">
      <div class="result-correct" id="result-correct">0</div>
      <div class="result-sep">/</div>
      <div class="result-total-num" id="result-total">15</div>
    </div>
    <div class="result-unit" id="result-unit"></div>
    <div class="result-msg" id="result-msg"></div>
    <div class="result-actions">
      <button class="btn-outline" onclick="showScreen('screen-home')">홈으로</button>
      <button class="btn btn-next" onclick="retryCategory()">다시 풀기</button>
    </div>
  </div>
</div>

<script src="questions.js"></script>
<script>
  const NUMS = ["①", "②", "③", "④"];

  const state = {
    catIdx: 0,
    questions: [],
    idx: 0,
    correctOnFirst: 0,
    isFirstAttempt: true,
    answered: false,
  };

  // ── 초기화: 카테고리 목록 렌더링 ──
  function init() {
    const list = document.getElementById("category-list");
    list.innerHTML = "";
    CATEGORIES.forEach((cat, i) => {
      const card = document.createElement("div");
      card.className = "category-card";
      card.onclick = () => startCategory(i);
      card.innerHTML = `
        <div>
          <div class="cat-name">${cat.name}</div>
          <div class="cat-sub">${cat.subtitle}</div>
          <div class="cat-meta">${cat.questions.length}문제 · 랜덤 출제</div>
        </div>
        <div class="cat-arrow">→</div>
      `;
      list.appendChild(card);
    });
  }

  // ── 화면 전환 ──
  function showScreen(id) {
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
  }

  // ── 카테고리 시작 ──
  function startCategory(catIdx) {
    const cat = CATEGORIES[catIdx];
    state.catIdx = catIdx;
    state.questions = shuffle([...cat.questions]);
    state.idx = 0;
    state.correctOnFirst = 0;
    state.isFirstAttempt = true;
    state.answered = false;

    document.getElementById("quiz-nav-label").textContent =
      `${cat.name} · ${cat.subtitle}`;

    showScreen("screen-quiz");
    loadQuestion(0);
  }

  // ── 문제 로드 ──
  // isRetry=true 이면 isFirstAttempt를 유지 (재도전은 점수 불인정)
  function loadQuestion(i, isRetry = false) {
    const q = state.questions[i];
    const total = state.questions.length;
    if (!isRetry) state.isFirstAttempt = true;
    state.answered = false;

    document.getElementById("progressFill").style.width =
      `${(i / total) * 100}%`;
    document.getElementById("progressLabel").textContent =
      `${i + 1} / ${total}`;

    const principleBox = document.getElementById("principleBox");
    principleBox.textContent = q.principle;
    principleBox.classList.remove("open");
    document.getElementById("principleBtn").textContent = "💡 기본원리";

    document.getElementById("qText").textContent = q.q;

    const choicesEl = document.getElementById("choices");
    choicesEl.innerHTML = "";
    q.opts.forEach((text, ci) => {
      const btn = document.createElement("button");
      btn.className = "choice";
      btn.innerHTML = `<span class="badge">${NUMS[ci]}</span>${text}`;
      btn.onclick = () => onPick(ci);
      choicesEl.appendChild(btn);
    });

    document.getElementById("feedback").className = "feedback";
    document.getElementById("feedback").textContent = "";
    document.getElementById("actionRow").innerHTML = "";
  }

  // ── 답 선택 ──
  function onPick(ci) {
    if (state.answered) return;
    state.answered = true;

    const q = state.questions[state.idx];
    const isCorrect = ci === q.answer;
    const btns = document.querySelectorAll(".choice");
    btns.forEach(b => (b.disabled = true));
    btns[q.answer].classList.add("correct");
    if (!isCorrect) btns[ci].classList.add("wrong");

    const fb = document.getElementById("feedback");
    if (isCorrect) {
      if (state.isFirstAttempt) state.correctOnFirst++;
      fb.className = "feedback correct";
      fb.textContent = "✓  " + q.correct_msg;
    } else {
      state.isFirstAttempt = false;
      fb.className = "feedback wrong";
      fb.textContent = "✗  " + (q.wrong_explains[ci] || "");
    }

    const row = document.getElementById("actionRow");
    row.innerHTML = "";

    if (isCorrect) {
      const isLast = state.idx === state.questions.length - 1;
      const btn = document.createElement("button");
      btn.className = "btn btn-next";
      btn.textContent = isLast ? "결과 보기" : "다음 문제 →";
      btn.onclick = isLast
        ? showResult
        : () => { state.idx++; loadQuestion(state.idx); };
      row.appendChild(btn);
    } else {
      const btn = document.createElement("button");
      btn.className = "btn btn-retry";
      btn.textContent = "↺  다시 풀기";
      btn.onclick = () => loadQuestion(state.idx, true);
      row.appendChild(btn);
    }
  }

  // ── 기본원리 토글 ──
  function togglePrinciple() {
    const box = document.getElementById("principleBox");
    const btn = document.getElementById("principleBtn");
    box.classList.toggle("open");
    btn.textContent = box.classList.contains("open")
      ? "💡 기본원리 닫기"
      : "💡 기본원리";
  }

  // ── 홈으로 (퀴즈 중이면 결과 먼저) ──
  function goHome() {
    const active = document.querySelector(".screen.active")?.id;
    if (active === "screen-quiz") {
      showResult();
    } else {
      showScreen("screen-home");
    }
  }

  // ── 결과 화면 ──
  function showResult() {
    const cat = CATEGORIES[state.catIdx];
    const correct = state.correctOnFirst;
    const total = state.questions.length;
    const pct = total > 0 ? Math.round((correct / total) * 100) : 0;

    document.getElementById("result-cat-name").textContent = cat.name;
    document.getElementById("result-correct").textContent = correct;
    document.getElementById("result-total").textContent = total;

    let icon, title, msg;
    if (pct >= 90) {
      icon = "🏆"; title = "완벽해요!";
      msg = "계정과목을 정말 잘 이해하고 있어요. 이 정도면 실전도 자신 있겠는데요?";
    } else if (pct >= 70) {
      icon = "👍"; title = "잘 하셨어요!";
      msg = "기본기가 잘 잡혀 있어요. 틀린 문제를 한 번 더 풀어보면 완벽해질 거예요.";
    } else if (pct >= 50) {
      icon = "💪"; title = "절반 이상 맞췄어요!";
      msg = "좋은 출발이에요. 기본원리를 읽으며 다시 풀면 금방 실력이 늘 거예요.";
    } else {
      icon = "📚"; title = "다시 도전해 봐요!";
      msg = "각 문제의 기본원리를 꼼꼼히 읽어보고 재도전해 보세요. 할 수 있어요!";
    }

    document.getElementById("result-icon").textContent = icon;
    document.getElementById("result-title").textContent = title;
    document.getElementById("result-unit").textContent =
      `${total}문제 중 첫 번째 시도에서 ${correct}문제 정답`;
    document.getElementById("result-msg").textContent = msg;
    showScreen("screen-result");
  }

  // ── 같은 카테고리 재도전 ──
  function retryCategory() {
    startCategory(state.catIdx);
  }

  // ── Fisher-Yates 셔플 ──
  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  init();
</script>
</body>
</html>
